<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Order Successful</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      margin: 0;
      font-family: inherit;
      background: #f8fafc;
      color: #1f2937;
    }
    .success-page {
      max-width: 760px;
      margin: 40px auto;
      padding: 24px;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 24px 50px rgba(15, 23, 42, 0.08);
    }
    .success-page h1 {
      margin-top: 0;
      color: #0f766e;
    }
    .status-pill {
      display: inline-flex;
      gap: 0.5rem;
      align-items: center;
      padding: 0.5rem 0.75rem;
      border-radius: 9999px;
      background: #dcfce7;
      color: #166534;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .order-detail {
      margin: 1.25rem 0;
      padding: 1rem;
      background: #f1f5f9;
      border-radius: 12px;
    }
    .order-detail p {
      margin: 0.5rem 0;
    }
    .order-summary pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #eef2ff;
      padding: 1rem;
      border-radius: 12px;
      overflow-x: hidden;
    }
    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }
    .buttons a,
    .buttons button {
      padding: 0.85rem 1.25rem;
      border-radius: 9999px;
      border: none;
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary {
      background: #0f766e;
      color: #ffffff;
    }
    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <main class="success-page">
    <h1>✅ Order Placed Successfully</h1>
    <div id="status" class="status-pill">Finalizing order...</div>
    <div id="order-content"></div>
    <div class="buttons">
      <a href="index.html" class="btn-primary">Back to Home</a>
      <button id="new-order" class="btn-secondary">Place Another Order</button>
    </div>
  </main>
  <script>
    function escapeHTML(value) {
      return String(value || '').replace(/[&<>'"]/g, function(char) {
        return {
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          "'": '&#39;',
          '"': '&quot;'
        }[char];
      });
    }

    function renderOrderDetails(data) {
      const notification = data.notificationResult || {};
      const statusEl = document.getElementById('status');
      const orderContent = document.getElementById('order-content');

      if (!data.orderNumber) {
        statusEl.textContent = 'No recent order found.';
        orderContent.innerHTML = '<p>Please place an order from the home page first.</p>';
        return;
      }

      const whatsappStatus = notification.whatsappSent ? 'Message sent to WhatsApp.' : 'WhatsApp confirmation could not be delivered.';
      const emailStatus = notification.emailSent ? 'Email confirmation was sent.' : 'Email confirmation was not sent.';

      statusEl.textContent = notification.whatsappSent ? 'WhatsApp confirmation sent successfully' : 'Order recorded but WhatsApp confirmation not sent';
      statusEl.style.background = notification.whatsappSent ? '#dcfce7' : '#fde68a';
      statusEl.style.color = notification.whatsappSent ? '#166534' : '#92400e';

      orderContent.innerHTML = `
        <div class="order-detail">
          <p><strong>Order Number:</strong> ${escapeHTML(data.orderNumber)}</p>
          <p><strong>Name:</strong> ${escapeHTML(data.customerName)}</p>
          <p><strong>Phone:</strong> ${escapeHTML(data.phone)}</p>
          <p><strong>Email:</strong> ${escapeHTML(data.email) || 'Not provided'}</p>
          <p><strong>Delivery Address:</strong> ${escapeHTML(data.address)}</p>
          <p><strong>Amount Paid:</strong> ₹${escapeHTML(data.amount)}</p>
          <p><strong>Payment:</strong> ${escapeHTML(data.paymentMethod || 'Razorpay')} — ${data.paymentMethod === 'Razorpay' ? 'Your payment has been completed successfully.' : 'We will verify your payment and confirm delivery shortly.'}</p>
          <p><strong>WhatsApp Status:</strong> ${whatsappStatus}</p>
          <p><strong>Email Status:</strong> ${emailStatus}</p>
        </div>
        <div class="order-summary">
          <h2>Order Summary</h2>
          <pre>${escapeHTML(data.orderSummary)}</pre>
        </div>
        <p>We have attempted to send your order details to WhatsApp. If you don't receive the message within a few minutes, please contact us directly.</p>
      `;
    }

    document.getElementById('new-order').addEventListener('click', function() {
      sessionStorage.removeItem('orderSuccessData');
      window.location.href = 'index.html';
    });

    const storedData = sessionStorage.getItem('orderSuccessData');
    const orderData = storedData ? JSON.parse(storedData) : {};
    renderOrderDetails(orderData);
  </script>
</body>
</html>
