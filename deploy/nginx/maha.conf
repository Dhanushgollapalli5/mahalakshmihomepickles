server {
    listen 80;
    server_name mahalakshmihomepickles.com www.mahalakshmihomepickles.com;

    # serve static files (optional) — point to your built frontend or project folder
    root /var/www/maha;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # serve all other files (static site)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # increase body size for file uploads if needed
    client_max_body_size 20M;
}
