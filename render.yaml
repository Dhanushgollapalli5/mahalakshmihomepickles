services:
  - type: web
    name: maha
    runtime: node
    plan: starter
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: CURRENCY
        value: INR
      - key: PAYMENT_MODE
        value: razorpay
      # WhatsApp Notifications via Twilio
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_FROM
        sync: false
      - key: ORDER_WHATSAPP_TO
        sync: false
      - key: WHATSAPP_PROVIDER
        value: twilio
      # Email Notifications
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASSWORD
        sync: false
      - key: ORDER_EMAIL
        sync: false
      # Alternative WhatsApp provider (optional fallback)
      - key: CALLMEBOT_API_KEY
        sync: false
      - key: CALLMEBOT_PHONE
        sync: false
