services:
  - type: web
    name: maha
    runtime: node
    plan: starter
    branch: main
    buildCommand: npm ci
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: CURRENCY
        value: INR
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_WHATSAPP_NUMBER
        sync: false
      - key: WHATSAPP_PROVIDER
        value: twilio
      - key: WHATSAPP_RECIPIENT_NUMBER
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: UPI_ID
        sync: false
      - key: PAYMENT_MODE
        value: razorpay
